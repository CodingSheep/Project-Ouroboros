<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Ouroboros</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Playlists</h1>
    <button id="addPlaylistBtn">Add Playlist</button>
    <ul id="playlistContainer">
    {% for name, playlist in playlists.items() %}
    <li data-name="{{ name }}" draggable="false">
        <span class="drag-handle">≡</span>
        <span class="playlist-name">{{ name }}</span>
        <button class="renameBtn">Rename</button>
        <form action="{{ url_for('delete_playlist', name=name) }}" method="post" style="display:inline;">
            <button type="submit">Delete</button>
        </form>
    </li>
    {% endfor %}
</ul>

    <script>
        // Add playlist
        document.getElementById('addPlaylistBtn').addEventListener('click', () => {
            const name = prompt("Enter playlist name:");
            if (!name)
                return;
            fetch("{{ url_for('add_playlist') }}", {
                method: 'POST',
                headers: {'Content-Type':'application/x-www-form-urlencoded'},
                body: `name=${encodeURIComponent(name)}`
            }).then(() => location.reload());
        });

        // Clicking the playlist name opens it
        document.querySelectorAll('.playlist-name').forEach(el => {
            el.addEventListener('click', () => {
                const playlistName = el.parentElement.getAttribute('data-name');
                window.location.href = `/playlist/${encodeURIComponent(playlistName)}`;
            });
        });

        // Rename button click
        document.querySelectorAll('.renameBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                const li = btn.parentElement;
                const oldName = li.getAttribute('data-name');
                const newName = prompt("Enter new playlist name:", oldName);
                if (!newName || newName === oldName)
                    return;
                fetch(`/playlist/rename/${encodeURIComponent(oldName)}`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/x-www-form-urlencoded'},
                    body: `name=${encodeURIComponent(newName)}`
                }).then(() => location.reload());
            });
        });

        // Drag handle + sorting (same pattern as track sorting)
        document.querySelectorAll('.drag-handle').forEach(handle => {
            handle.addEventListener('mousedown', () => handle.parentElement.draggable = true);
            handle.addEventListener('dragend', () => handle.parentElement.draggable = false);
        });

        const container = document.getElementById('playlistContainer');
        let dragging = null;

        container.querySelectorAll('li').forEach(item => {
            item.addEventListener('dragstart', e => {
                dragging = item;
                e.dataTransfer.setData('text/plain', 'drag');
                item.style.opacity = '0.6';
            });
            item.addEventListener('dragover', e => e.preventDefault());
            item.addEventListener('drop', e => {
                e.preventDefault();
                if (!dragging || dragging === item) return;
                const rect = item.getBoundingClientRect();
                const before = (e.clientY - rect.top) < rect.height / 2;
                container.insertBefore(dragging, before ? item : item.nextSibling);
                saveOrder();
            });
            item.addEventListener('dragend', () => {
                item.style.opacity = '';
                dragging = null;
            });
        });

        function saveOrder() {
            const order = Array.from(container.querySelectorAll('li')).map(li => li.getAttribute('data-name'));
            fetch('/playlist/reorder', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order})
            });
        }
    </script>
</body>
</htm
